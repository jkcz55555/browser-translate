<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 翻译插件</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>🌐 AI 翻译</h1>
      <p class="subtitle">实时网页翻译</p>
    </div>

    <div class="settings">
      <div class="setting-item">
        <label>源语言</label>
        <select id="sourceLang">
          <option value="auto">自动检测</option>
          <option value="en">英语</option>
          <option value="zh">中文</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>

      <div class="setting-item">
        <label>目标语言</label>
        <select id="targetLang">
          <option value="zh">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>

      <div class="setting-item">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="输入你的 API Key">
      </div>

      <div class="setting-item">
        <label>API 地址</label>
        <input type="text" id="apiUrl" placeholder="https://open.bigmodel.cn/api/paas/v4/chat/completions">
      </div>

      <div class="setting-item toggle-item">
        <label>自动翻译</label>
        <label class="toggle-switch">
          <input type="checkbox" id="autoTranslateToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-item toggle-item">
        <label>显示译文</label>
        <label class="toggle-switch">
          <input type="checkbox" id="showTranslationToggle" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="actions">
      <button id="translateBtn" class="btn-primary">开始翻译</button>
      <button id="stopBtn" class="btn-secondary" disabled>停止翻译</button>
    </div>

    <div id="status" class="status"></div>

    <div class="footer">
      <p>💡 开启自动翻译后，切换页面会自动翻译</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
